version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: million_miles_db
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app_secret
      POSTGRES_DB: million_miles
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d million_miles"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: {}
